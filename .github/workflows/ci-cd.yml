name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装系统依赖
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: 安装 Python 依赖
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          sed -i 's/dynamic = \["version"\]/version = "0.1.0"/' VoxCPM/pyproject.toml
          pip install --no-deps -e VoxCPM/
          pip install -r requirements.txt

      - name: 语法和导入检查
        run: |
          python -m py_compile app.py && echo "app.py syntax OK"
          python -m py_compile desktop_app.py && echo "desktop_app.py syntax OK"
          python -m py_compile tts_engine.py && echo "tts_engine.py syntax OK"
          python -c "import models; print('models OK')"

  build-and-deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/voxcpm-studio:latest
            ghcr.io/${{ github.repository_owner }}/voxcpm-studio:${{ github.sha }}

      # 有服务器后，取消下面注释并配置对应 Secrets 即可自动部署
